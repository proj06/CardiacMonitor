<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardiac SOS — Sign In</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--bg); }
    .hero-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 60% at 20% 50%, rgba(229,25,30,0.07) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 20%, rgba(59,130,246,0.05) 0%, transparent 60%);
    }
    .auth-wrap { position: relative; z-index: 1; }
    .auth-card { animation: card-in 0.4s ease; }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ecg-deco {
      text-align: center;
      margin-bottom: 1.5rem;
      opacity: 0.25;
    }
    .role-select {
      display: flex; gap: 0.5rem;
    }
    .role-btn {
      flex: 1; padding: 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--sub);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
      text-align: center;
    }
    .role-btn.active { border-color: var(--red); color: var(--red); background: var(--red-glow); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0.25rem 0; }
  </style>
</head>
<body>
  <div class="hero-bg"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="nav-pulse" style="margin: 0 auto 12px; width: 12px; height: 12px;"></div>
        <h1>Cardiac<span>SOS</span></h1>
        <p>AI-Powered Cardiac Emergency Response</p>
      </div>

      <div class="ecg-deco">
        <svg width="240" height="36" viewBox="0 0 240 36">
          <polyline points="0,18 30,18 40,18 50,4 58,32 66,2 74,18 84,18 94,18 104,4 112,32 120,2 128,18 140,18 160,18 170,4 178,32 186,2 194,18 240,18"
            fill="none" stroke="var(--red)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="l-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;" id="login-btn">
          Sign In
        </button>
        <p style="text-align:center; font-size:0.78rem; color:var(--muted);">
        </p>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="r-name" placeholder="Dr. X" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="r-password" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label>I am a</label>
          <div class="role-select">
            <button type="button" class="role-btn active" onclick="setRole('patient', this)">Patient</button>
            <button type="button" class="role-btn" onclick="setRole('responder', this)">Responder</button>
          </div>
          <input type="hidden" id="r-role" value="patient" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;" id="register-btn">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="/js/utils.js"></script>
  <script>
    api('GET', '/api/me').then(user => {
      window.location.href = user.role === 'responder' ? '/responder' : '/dashboard';
    }).catch(() => {});

    let currentRole = 'patient';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    }

    function setRole(role, btn) {
      currentRole = role;
      document.getElementById('r-role').value = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…'; btn.disabled = true;
      try {
        const data = await api('POST', '/api/login', {
          email: document.getElementById('l-email').value,
          password: document.getElementById('l-password').value
        });
        Toast.show(`Welcome back, ${data.name}!`, 'success');
        setTimeout(() => window.location.href = data.role === 'responder' ? '/responder' : '/dashboard', 600);
      } catch(err) {
        Toast.show(err.message, 'error');
        btn.textContent = 'Sign In'; btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.textContent = 'Creating…'; btn.disabled = true;
      try {
        const data = await api('POST', '/api/register', {
          name: document.getElementById('r-name').value,
          email: document.getElementById('r-email').value,
          password: document.getElementById('r-password').value,
          role: document.getElementById('r-role').value
        });
        Toast.show(`Account created! Welcome, ${data.name}`, 'success');
        setTimeout(() => window.location.href = data.role === 'responder' ? '/responder' : '/dashboard', 600);
      } catch(err) {
        Toast.show(err.message, 'error');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>

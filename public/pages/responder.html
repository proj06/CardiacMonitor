<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardiac SOS — Responder</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .resp-header {
      padding: 1.5rem 0 0;
      display: flex; align-items: center; justify-content: space-between;
    }

    .resp-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin: 1rem 0;
    }

    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .stat-box .num {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
    }

    .stat-box .lbl {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 2px;
    }

    .alert-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }

    .alert-profile {
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .profile-item { font-size: 0.78rem; color: var(--sub); }
    .profile-item strong { color: var(--text); display: block; font-size: 0.82rem; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

    .symptoms-list {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-top: 0.4rem;
    }

    .symptom-tag {
      background: var(--red-glow);
      border: 1px solid var(--red-dim);
      color: var(--red);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .alert-score-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      border: 3px solid;
      flex-shrink: 0;
    }

    .new-alert-banner {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: var(--red);
      color: #fff;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 150;
      animation: banner-in 0.3s ease;
      white-space: nowrap;
    }

    @keyframes banner-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .resolved-overlay {
      position: absolute; inset: 0;
      background: rgba(10,12,15,0.7);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--green); font-size: 0.9rem;
    }

    .alert-card { position: relative; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-pulse"></div>
      Cardiac<span>SOS</span>
    </div>
    <ul class="nav-links">
      <li><a href="/responder" class="active">Alerts</a></li>
      <li><a href="/profile" class="hide-sm">Profile</a></li>
      <li><a href="/responder/appointments" class="appointments-nav-btn">Appointments</a></li>
      <li><a href="#" onclick="logout(); return false;" class="hide-sm">Sign Out</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="container">
      <div class="resp-header">
        <div>
          <h2 style="font-family:var(--font-head); font-size:1.4rem; font-weight:800;">Responder Console</h2>
          <p style="color:var(--muted); font-size:0.82rem;" id="resp-greeting">Loading...</p>
        </div>
        <div style="display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--green);">
          <span class="status-dot"></span> Online & Monitoring
        </div>
      </div>

      <div class="resp-stats">
        <div class="stat-box">
          <div class="num" id="stat-active" style="color:var(--red);">0</div>
          <div class="lbl">Active Alerts</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-resolved" style="color:var(--green);">0</div>
          <div class="lbl">Resolved</div>
        </div>
        <div class="stat-box">
          <div class="num" id="stat-total">0</div>
          <div class="lbl">Total Today</div>
        </div>
      </div>

      <div class="section-header" style="margin-bottom:1rem;">
        <span class="section-title">Live Emergency Alerts</span>
        <button class="btn btn-ghost" onclick="loadAlerts()" style="font-size:0.78rem; padding:6px 12px;">↻ Refresh</button>
      </div>

      <div id="alert-list" class="alert-list">
        <div class="empty-state">
          <div style="font-weight:600; margin-bottom:0.5rem;">No Active Emergencies</div>
          <div style="font-size:0.85rem;">You'll be notified instantly when a patient needs help.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="/js/utils.js"></script>
  <script>
    let currentUser = null;
    const socket = io();
    let resolvedCount = 0;

    const symptomNames = {
      chest_pain: 'Chest Pain',
      jaw_pain: 'Jaw Pain',
      arm_pain: 'Arm Pain',
      breathlessness: 'Breathlessness',
      nausea: 'Nausea',
      dizziness: 'Dizziness',
      sweating: 'Cold Sweat',
      fatigue: 'Fatigue'
    };

    async function init() {
      currentUser = await requireLogin();
      if (!currentUser) return;
      if (currentUser.role !== 'responder') { window.location.href = '/dashboard'; return; }
      document.getElementById('resp-greeting').textContent = `Welcome, ${currentUser.name} — Ready to respond`;
      await loadAlerts();
    }

    async function loadAlerts() {
      try {
        const alerts = await api('GET', '/api/alerts');
        renderAlerts(alerts);
        document.getElementById('stat-active').textContent = alerts.length;
        document.getElementById('stat-total').textContent = alerts.length + resolvedCount;
      } catch (err) {
        Toast.show('Failed to load alerts', 'error');
      }
    }

    function renderAlerts(alerts) {
      const list = document.getElementById('alert-list');
      if (alerts.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div style="font-weight:600; margin-bottom:0.5rem;">No Active Emergencies</div>
          <div style="font-size:0.85rem;">You'll be notified instantly when a patient needs help.</div>
        </div>`;
        return;
      }
      list.innerHTML = alerts.map(a => buildAlertCard(a)).join('');
    }

    function buildAlertCard(a) {
      const color = a.riskScore >= 70 ? 'var(--red)' : a.riskScore >= 40 ? 'var(--amber)' : 'var(--green)';
      const label = a.riskScore >= 70 ? 'EMERGENCY' : a.riskScore >= 40 ? 'WARNING' : 'NORMAL';
      const sympList = (a.symptoms || []).map(s =>
        `<span class="symptom-tag">${symptomNames[s] || s}</span>`
      ).join('');
      const mapsUrl = `https://www.google.com/maps?q=${a.lat},${a.lng}`;
      const time = timeAgo(a.createdAt);

      return `<div class="alert-card" id="alert-${a._id}">
        <div class="alert-card-header">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="alert-score-ring" style="border-color:${color}; color:${color};">${a.riskScore}</div>
            <div>
              <div class="alert-patient">${a.userName}</div>
              <div style="font-size:0.75rem; font-weight:700; color:${color}; letter-spacing:0.06em;">${label}</div>
            </div>
          </div>
          <div class="alert-time">${time}</div>
        </div>

        <div class="alert-vitals">
          <div class="alert-vital-item">HR <strong>${a.heartRate} bpm</strong></div>
          <div class="alert-vital-item">SpO₂ <strong>${a.spo2}%</strong></div>
          <div class="alert-vital-item">HRV <strong>${a.hrv}ms</strong></div>
        </div>

        ${sympList ? `<div class="symptoms-list">${sympList}</div>` : ''}

        <div class="alert-profile">
          <div class="profile-item"><strong>${a.bloodGroup || '—'}</strong>Blood Group</div>
          <div class="profile-item"><strong>${a.allergies || 'None'}</strong>Allergies</div>
          <div class="profile-item"><strong>${a.medications || 'None'}</strong>Medications</div>
          <div class="profile-item"><strong>${a.conditions || 'None'}</strong>Conditions</div>
        </div>

        <div class="alert-actions">
          <a href="${mapsUrl}" target="_blank" class="btn btn-primary" style="flex:1; font-size:0.82rem;">
            Navigate to Patient's location
          </a>
          <button class="btn btn-green" onclick="resolveAlert('${a._id}')" style="font-size:0.82rem; padding:10px 16px;">
            ✓ Resolved
          </button>
        </div>
      </div>`;
    }

    async function resolveAlert(id) {
      try {
        await api('POST', `/api/alert/${id}/resolve`);
        const card = document.getElementById(`alert-${id}`);
        if (card) {
          const overlay = document.createElement('div');
          overlay.className = 'resolved-overlay';
          overlay.textContent = '✓ Marked as Resolved';
          card.appendChild(overlay);
          setTimeout(() => { card.remove(); loadAlerts(); }, 1500);
        }
        resolvedCount++;
        document.getElementById('stat-resolved').textContent = resolvedCount;
        Toast.show('Alert marked as resolved', 'success');
      } catch(err) {
        Toast.show('Failed: ' + err.message, 'error');
      }
    }

    function showNewAlertBanner(name) {
      const b = document.createElement('div');
      b.className = 'new-alert-banner';
      b.textContent = `New Emergency — ${name}`;
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 4000);
      // Play alert sound (beep)
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
        osc.start(); osc.stop(ctx.currentTime + 0.8);
      } catch {}
    }

    socket.on('new_alert', (alert) => {
      showNewAlertBanner(alert.userName);
      Toast.show(`Emergency: ${alert.userName} — Risk ${alert.riskScore}`, 'error', 6000);
      loadAlerts();
    });

    socket.on('alert_resolved', () => { loadAlerts(); });

    init();
  </script>
</body>
</html>

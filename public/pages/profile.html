<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardiac SOS — Profile</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .profile-page { padding: 2rem 0; }
    
    .profile-grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    
    .profile-sidebar { display: flex; flex-direction: column; gap: 1rem; }
    
    .avatar-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      text-align: center;
    }
    
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red-dim), var(--red));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      color: #fff;
    }

    /* Style for the SVG inside the big avatar circle */
    .avatar-circle svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }
    
    .avatar-name { font-family: var(--font-head); font-size: 1.1rem; margin-bottom: 4px; }
    
    .avatar-role {
      display: inline-block;
      background: var(--red-glow); color: var(--red);
      font-size: 0.72rem; font-weight: 700;
      padding: 2px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* Profile Navigation Styles */
    .profile-nav { display: flex; flex-direction: column; gap: 4px; }
    
    .profile-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      color: var(--sub);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
    }

    .profile-nav-item svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      transition: var(--transition);
    }

    .profile-nav-item:hover {
      color: var(--text);
      background: var(--border);
    }

    .profile-nav-item.active {
      color: var(--red);
      background: var(--red-glow);
      border-color: rgba(229, 25, 30, 0.2);
    }

    .profile-nav-item.active svg {
      stroke: var(--red);
    }

    .form-section { display: flex; flex-direction: column; gap: 1rem; }
    .save-row { display: flex; justify-content: flex-end; margin-top: 0.5rem; }

    @media (max-width: 720px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-sidebar { flex-direction: row; flex-wrap: wrap; }
      .avatar-box { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-pulse"></div>
      Cardiac<span>SOS</span>
    </div>
    <ul class="nav-links">
      <li><a href="/dashboard" class="active">Dashboard</a></li>
      <li><a href="/profile" class="hide-sm">Profile</a></li>
      <li><a href="/premium" id="premium-link" class="premium-nav-btn">Premium</a></li>
      <li><a href="#" onclick="logout(); return false;" class="hide-sm">Sign Out</a></li>
    </ul>
  </nav>


  <div class="page">
    <div class="container profile-page">
      <h2 style="font-family:var(--font-head); font-size:1.4rem; font-weight:800;">Medical Profile</h2>
      <p style="color:var(--muted); font-size:0.82rem; margin-top:2px;">This data is shared with responders during emergencies</p>

      <div class="profile-grid">
        <!-- Sidebar -->
        <div class="profile-sidebar">
          <div class="avatar-box">
            <!-- Icon container will be populated by JS -->
            <div class="avatar-circle" id="avatar-icon"></div>
            <div class="avatar-name" id="avatar-name">—</div>
            <div class="avatar-role" id="avatar-role">Patient</div>
            <div style="font-size:0.78rem; color:var(--muted); margin-top:0.75rem;" id="avatar-email">—</div>
          </div>

          <div class="card card-sm profile-nav">
            <div class="profile-nav-item active">
              <svg viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
              Medical Info
            </div>
          </div>
        </div>

        <!-- Main Form -->
        <div class="card">
          <div class="section-title" style="margin-bottom:1.5rem;">Medical Information</div>
          <div class="form-section">
            <div class="form-grid">
              <div class="form-group">
                <label>Blood Group</label>
                <select id="bloodGroup">
                  <option value="">Select...</option>
                  <option>A+</option><option>A-</option>
                  <option>B+</option><option>B-</option>
                  <option>O+</option><option>O-</option>
                  <option>AB+</option><option>AB-</option>
                </select>
              </div>
              <div class="form-group">
                <label>Known Allergies</label>
                <input type="text" id="allergies" placeholder="e.g. Penicillin, Aspirin" />
              </div>
            </div>

            <div class="form-group">
              <label>Current Medications</label>
              <input type="text" id="medications" placeholder="e.g. Atorvastatin 20mg, Metoprolol 50mg" />
            </div>

            <div class="form-group">
              <label>Chronic Conditions</label>
              <input type="text" id="conditions" placeholder="e.g. Hypertension, Diabetes Type 2" />
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 1.2rem; margin-top: 0.2rem;">
              <div class="section-title" style="margin-bottom:1rem;">Emergency Contact</div>
              <div class="form-grid">
                <div class="form-group">
                  <label>Contact Name</label>
                  <input type="text" id="emergencyContact" placeholder="Full name" />
                </div>
                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="tel" id="emergencyPhone" placeholder="+916283829300">
                  <small>Include country code (e.g., +91 for India)</small>
                </div>
              </div>
            </div>

            <div class="save-row">
              <button class="btn btn-primary" onclick="saveProfile()" id="save-btn">Save Profile</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="/js/utils.js"></script>
  <script>
    const SVG_HEART = `<svg viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`;
    const SVG_STETHOSCOPE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2.8l-.2-.5Z"/><path d="M2 13V6a3 3 0 0 1 3-3h7"/><path d="M10 10a5 5 0 0 1 10 0v2a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V10"/><path d="M7 21a2 2 0 0 0 4 0v-1a2 2 0 0 0-4 0Z"/><path d="M14 15v1a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-1"/></svg>`;

    async function init() {
      const user = await requireLogin();
      if (!user) return;

      if (user.role === 'responder') {
        document.getElementById('dash-link').href = '/responder';
        document.getElementById('dash-link').textContent = 'Console';
      }

      document.getElementById('avatar-name').textContent = user.name;
      document.getElementById('avatar-role').textContent = user.role === 'responder' ? 'Responder' : 'Patient';
      document.getElementById('avatar-email').textContent = user.email;
      
      // FIX: Use innerHTML to inject SVG instead of emojis
      document.getElementById('avatar-icon').innerHTML = user.role === 'responder' ? SVG_STETHOSCOPE : SVG_HEART;

      if (user.bloodGroup) document.getElementById('bloodGroup').value = user.bloodGroup;
      if (user.allergies) document.getElementById('allergies').value = user.allergies;
      if (user.medications) document.getElementById('medications').value = user.medications;
      if (user.conditions) document.getElementById('conditions').value = user.conditions;
      if (user.emergencyContact) document.getElementById('emergencyContact').value = user.emergencyContact;
      if (user.emergencyPhone) document.getElementById('emergencyPhone').value = user.emergencyPhone;
    }

    async function saveProfile() {
      const btn = document.getElementById('save-btn');
      btn.textContent = 'Saving…'; btn.disabled = true;
      try {
        await api('PUT', '/api/profile', {
          bloodGroup: document.getElementById('bloodGroup').value,
          allergies: document.getElementById('allergies').value,
          medications: document.getElementById('medications').value,
          conditions: document.getElementById('conditions').value,
          emergencyContact: document.getElementById('emergencyContact').value,
          emergencyPhone: document.getElementById('emergencyPhone').value
        });
        Toast.show('Profile saved successfully!', 'success');
      } catch(err) {
        Toast.show('Save failed: ' + err.message, 'error');
      }
      btn.textContent = 'Save Profile'; btn.disabled = false;
    }

    init();
  </script>
</body>
</html>
